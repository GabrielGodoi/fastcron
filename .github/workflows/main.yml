name: FastCron CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Build & Test
  # -----------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools (For local act simulator)
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DFASTCRON_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure -C Release

  # -----------------------------------------------------------------------
  # Job 2: Static Analysis (Cppcheck — MISRA memory compliance)
  # -----------------------------------------------------------------------
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run Cppcheck
        run: |
          cppcheck \
            --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            --std=c11 \
            --force \
            -I include/ \
            src/ tests/

  # -----------------------------------------------------------------------
  # Job 3: Documentation — Doxygen → Sphinx → GitHub Pages
  # -----------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ build-and-test, static-analysis ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Sphinx & Breathe
        run: pip install sphinx breathe sphinx_rtd_theme

      - name: Generate Doxygen XML
        run: doxygen docs/Doxyfile

      - name: Build Sphinx HTML
        run: sphinx-build -b html docs/ docs/_build/html

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastcron-docs
          path: ./docs/_build/html/

      - name: Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
          force_orphan: true
